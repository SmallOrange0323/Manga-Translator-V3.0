<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>漫譯 V3 - 行動控制台</title>
    <style>
        :root {
            --edge-blue: #0078d4;
            --edge-blue-hover: #005a9e;
            --bg-main: #f3f3f3;
            --bg-card: #ffffff;
            --text-primary: #242424;
            --text-secondary: #616161;
            --border-color: #e0e0e0;
            --radius: 8px;
            --header-height: 100px;
            --footer-height: 80px;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-main: #1c1c1c;
                --bg-card: #2d2d2d;
                --text-primary: #ffffff;
                --text-secondary: #adadad;
                --border-color: #3d3d3d;
            }
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: "Segoe UI", "SF Pro Display", -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-primary);
            line-height: 1.5;
            overflow: hidden;
        }

        .app-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            height: -webkit-fill-available; /* 修正 iOS 下 100vh 的問題 */
        }

        .app-header {
            background-color: var(--bg-card);
            border-bottom: 1px solid var(--border-color);
            padding: 12px 16px;
            flex-shrink: 0;
        }

        .header-main {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo { font-size: 24px; }
        .brand h1 { font-size: 18px; font-weight: 600; }

        .status-bar {
            font-size: 12px;
            color: var(--text-secondary);
            background: var(--bg-main);
            padding: 4px 12px;
            border-radius: 4px;
        }

        .app-main {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
        }

        .content-section {
            margin-bottom: 24px;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .section-header h2 {
            font-size: 16px;
            font-weight: 600;
        }

        .badge {
            background: var(--edge-blue);
            color: white;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 12px;
        }

        .image-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 12px;
        }

        .image-item {
            position: relative;
            aspect-ratio: 3/4;
            background: var(--bg-main);
            border-radius: var(--radius);
            overflow: hidden;
            border: 2px solid transparent;
            transition: all 0.2s;
            cursor: pointer;
        }

        .image-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .image-item.selected {
            border-color: var(--edge-blue);
        }

        .image-item.selected::after {
            content: "✓";
            position: absolute;
            top: 4px;
            right: 4px;
            background: var(--edge-blue);
            color: white;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
        }

        .empty-msg {
            grid-column: 1 / -1;
            text-align: center;
            padding: 40px 0;
            color: var(--text-secondary);
            font-size: 14px;
        }

        .app-footer {
            background-color: var(--bg-card);
            border-top: 1px solid var(--border-color);
            padding: 12px 16px;
            flex-shrink: 0;
        }

        .primary-btn {
            width: 100%;
            background-color: var(--edge-blue);
            color: white;
            border: none;
            padding: 14px;
            border-radius: var(--radius);
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .primary-btn:disabled {
            background-color: var(--text-secondary);
            opacity: 0.5;
            cursor: not-allowed;
        }

        .primary-btn:active:not(:disabled) {
            background-color: var(--edge-blue-hover);
            transform: scale(0.98);
        }

        .text-btn {
            background: none;
            border: none;
            color: var(--edge-blue);
            font-size: 14px;
            font-weight: 500;
            padding: 4px 8px;
            cursor: pointer;
        }

        .icon-btn {
            background: none;
            border: none;
            color: var(--text-primary);
            cursor: pointer;
            padding: 4px;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <div class="header-main">
                <div class="brand">
                    <span class="logo">🎌</span>
                    <h1>漫譯 V3</h1>
                </div>
                <button id="btn-open-options" class="icon-btn" title="設定">
                    <svg viewBox="0 0 24 24" width="24" height="24"><path fill="currentColor" d="M12 15.5A3.5 3.5 0 0 1 8.5 12A3.5 3.5 0 0 1 12 8.5A3.5 3.5 0 0 1 15.5 12A3.5 3.5 0 0 1 12 15.5M19.43 12.97C19.47 12.65 19.5 12.33 19.5 12C19.5 11.67 19.47 11.34 19.43 11.03L21.54 9.37C21.73 9.22 21.78 8.95 21.66 8.73L19.66 5.27C19.54 5.05 19.27 4.97 19.05 5.05L16.56 6.05C16.04 5.65 15.48 5.32 14.87 5.07L14.49 2.42C14.46 2.18 14.25 2 14 2H10C9.75 2 9.54 2.18 9.51 2.42L9.13 5.07C8.52 5.32 7.96 5.65 7.44 6.05L4.95 5.05C4.73 4.97 4.46 5.05 4.34 5.27L2.34 8.73C2.21 8.95 2.27 9.22 2.46 9.37L4.57 11.03C4.53 11.34 4.5 11.67 4.5 12C4.5 12.33 4.53 12.65 4.57 12.97L2.46 14.63C2.27 14.78 2.21 15.05 2.34 15.27L4.34 18.73C4.46 18.95 4.73 19.03 4.95 18.95L7.44 17.95C7.96 18.35 8.52 18.68 9.13 18.93L9.51 21.58C9.54 21.82 9.75 22 10 22H14C14.25 22 14.46 21.82 14.49 21.58L14.87 18.93C15.48 18.68 16.04 18.35 16.56 17.95L19.05 18.95C19.27 19.03 19.54 18.95 19.66 18.73L21.66 15.27C21.78 15.05 21.73 14.78 21.54 14.63L19.43 12.97Z"/></svg>
                </button>
            </div>
            <div id="status-bar" class="status-bar">
                正在初始化...
            </div>
        </header>

        <main class="app-main">
            <!-- 圖片選取區 -->
            <section id="section-images" class="content-section">
                <div class="section-header">
                    <h2>掃描到的圖片 <span id="image-count-badge" class="badge">0</span></h2>
                    <div class="actions">
                        <button id="btn-select-all" class="text-btn">全選</button>
                        <button id="btn-refresh" class="text-btn">重新掃描</button>
                    </div>
                </div>
                
                <div id="image-grid" class="image-grid">
                    <!-- 圖片預覽會動態注入到這裡 -->
                    <div class="empty-msg">尚未掃描到圖片</div>
                </div>
            </section>
        </main>

        <footer class="app-footer">
            <button id="btn-start-translate" class="primary-btn" disabled>
                開始翻譯 <span id="selected-count">(0)</span>
            </button>
        </footer>
    </div>

    <script type="module" src="main.js"></script>
</body>
</html>
