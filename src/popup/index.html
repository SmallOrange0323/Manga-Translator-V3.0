<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>漫譯 V3.0</title>
    <style>
        /* 使用系統字體，確保零外部依賴 */
        :root {
            --edge-blue: #0078d4;
            --edge-blue-dark: #005a9e;
            --bg: #ffffff;
            --text: #242424;
            --muted: #616161;
            --border: #e0e0e0;
            --card-hover: #f5f5f5;
        }

        /* 暗色模式支援 */
        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #1f1f1f;
                --text: #ffffff;
                --muted: #adadad;
                --border: #333333;
                --card-hover: #2d2d2d;
            }
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            width: 280px;
            padding: 12px;
            user-select: none;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 12px;
        }

        .logo { font-size: 24px; }

        .header-info h1 {
            font-size: 16px;
            font-weight: 600;
        }

        .header-info p {
            font-size: 12px;
            color: var(--muted);
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .btn {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 14px;
            border-radius: 8px;
            border: 1px solid transparent;
            cursor: pointer;
            font-family: inherit;
            font-size: 14px;
            font-weight: 500;
            transition: background 0.2s;
            text-align: left;
            width: 100%;
            background: transparent;
            color: var(--text);
        }

        .btn:hover { background: var(--card-hover); }
        .btn:active { background: var(--border); }

        .btn-primary {
            background: var(--edge-blue);
            color: white;
        }
        .btn-primary:hover { background: var(--edge-blue-dark); }

        .btn-icon {
            font-size: 18px;
            width: 24px;
            text-align: center;
        }

        .btn-text { flex: 1; }
        .btn-text small {
            display: block;
            font-size: 11px;
            opacity: 0.8;
            font-weight: normal;
        }

        #panel-not-available {
            display: none;
            font-size: 11px;
            color: #d83b01;
            text-align: center;
            margin-top: 8px;
            padding: 4px;
            background: rgba(216, 59, 1, 0.1);
            border-radius: 4px;
        }

        #status-msg {
            font-size: 11px;
            color: var(--muted);
            text-align: center;
            margin-top: 8px;
            min-height: 14px;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">🎌</div>
        <div class="header-info">
            <h1>漫譯 V3.0</h1>
            <p>Manga Translator</p>
        </div>
    </div>

    <div class="btn-group">
        <div id="btn-open-panel" class="btn btn-primary" role="button" tabindex="0">
            <span class="btn-icon">📖</span>
            <div class="btn-text">
                開啟翻譯面板
                <small id="panel-desc">在側邊欄或新分頁開啟</small>
            </div>
        </div>

        <div id="btn-open-settings" class="btn" role="button" tabindex="0">
            <span class="btn-icon">⚙️</span>
            <div class="btn-text">
                開啟設定
                <small>API 金鑰與模型管理</small>
            </div>
        </div>
    </div>

    <div id="panel-not-available">
        ⚠️ 行動端不支援側邊欄，將為您開啟新分頁。
    </div>
    <div id="status-msg"></div>

    <div id="debug-section" style="display: none; margin-top: 12px; border-top: 1px dashed var(--border); padding-top: 8px;">
        <h3 style="font-size: 11px; margin-bottom: 4px;">偵錯日誌 (Debug Logs):</h3>
        <div id="debug-log-console" style="font-family: monospace; font-size: 9px; background: rgba(0,0,0,0.05); color: var(--text); max-height: 120px; overflow-y: auto; padding: 6px; border-radius: 4px; word-break: break-all; white-space: pre-wrap; line-height: 1.2;"></div>
    </div>
    <div id="btn-toggle-debug" style="font-size: 10px; color: var(--muted); text-align: center; margin-top: 12px; cursor: pointer; text-decoration: underline; user-select: none;">
        顯示偵錯資訊 (Show Debug info)
    </div>

    <script src="main.js" type="module"></script>
</body>
</html>
