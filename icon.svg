<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <!-- 背景漸層：科技深邃紫藍 -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1b4b" />
      <stop offset="100%" stop-color="#311042" />
    </linearGradient>
    
    <!-- 對話框漸層：微光玻璃質感 -->
    <linearGradient id="bubbleGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#f1f5f9" />
    </linearGradient>

    <!-- 雲端與箭頭漸層：霓虹青藍 -->
    <linearGradient id="syncGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#06b6d4" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>

    <!-- V3 標籤漸層：炫彩霓虹橘紅 -->
    <linearGradient id="v3Grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ec4899" />
      <stop offset="100%" stop-color="#f43f5e" />
    </linearGradient>

    <!-- 陰影濾鏡 -->
    <filter id="dropShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="3" flood-color="#000000" flood-opacity="0.4" />
    </filter>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- 1. 背景圓角矩形 -->
  <rect width="128" height="128" rx="28" fill="url(#bgGrad)" stroke="#4338ca" stroke-width="2.5" />

  <!-- 2. 漫畫對話框 (Speech Bubble) -->
  <g filter="url(#dropShadow)">
    <!-- 對話框本體路徑 -->
    <path d="M 28 32 
             C 28 22, 100 22, 100 32 
             C 100 42, 100 66, 84 66 
             L 88 78 
             L 72 66 
             L 28 66 
             C 28 66, 28 42, 28 32 Z" 
          fill="url(#bubbleGrad)" />
    
    <!-- 翻譯「譯」字或「M」字標誌（這裡使用高質感的 M 與 A 交叉藝術設計） -->
    <text x="60" y="49" font-family="'Inter', 'Montserrat', sans-serif, system-ui" font-size="22" font-weight="900" fill="#1e1b4b" text-anchor="middle">M</text>
  </g>

  <!-- 3. 雲端雙向同步符號 (Cloud Sync) -->
  <g filter="url(#dropShadow)" transform="translate(8, 12)">
    <!-- 雲朵底圖 -->
    <path d="M 28 66 
             A 10 10 0 0 1 36 50 
             A 14 14 0 0 1 62 46 
             A 10 10 0 0 1 72 60 
             A 8 8 0 0 1 70 70 
             L 28 70 
             Z" 
          fill="none" stroke="url(#syncGrad)" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" />
    
    <!-- 雙向循環箭頭 -->
    <path d="M 44 58 L 52 58 L 52 50" fill="none" stroke="#22c55e" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)" />
    <path d="M 54 62 L 46 62 L 46 70" fill="none" stroke="#22c55e" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)" />
  </g>

  <!-- 4. 右下角炫彩 V3.0 標籤圓環 -->
  <g filter="url(#dropShadow)">
    <circle cx="96" cy="94" r="18" fill="url(#v3Grad)" stroke="#ffffff" stroke-width="2" />
    <text x="96" y="100" font-family="'Outfit', 'Roboto', sans-serif" font-size="15" font-weight="900" fill="#ffffff" text-anchor="middle">V3</text>
  </g>
</svg>
